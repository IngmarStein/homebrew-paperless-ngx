name: Autobump

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autobump:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@master

      - name: Check for outdated formulae
        id: livecheck
        run: |
          brew livecheck --tap ingmarstein/paperless-ngx --json | \
            jq -c '[.[] | select(.version.outdated == true)]' > /tmp/outdated.json
          count=$(jq length /tmp/outdated.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "All formulae are up to date"
          else
            jq -r '.[] | "\(.formula): \(.version.current) → \(.version.latest)"' /tmp/outdated.json
          fi

      - name: Bump outdated formulae
        if: steps.livecheck.outputs.count != '0'
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -c '.[]' /tmp/outdated.json | while IFS= read -r entry; do
            formula=$(echo "$entry" | jq -r '.formula')
            current=$(echo "$entry" | jq -r '.version.current')
            latest=$(echo "$entry" | jq -r '.version.latest')
            # Extract short name (e.g. "paperless-ngx" from "ingmarstein/paperless-ngx/paperless-ngx")
            name=$(echo "$formula" | awk -F/ '{print $NF}')
            branch="autobump/${name}-${latest}"

            echo "::group::${name} ${current} → ${latest}"

            # Check if PR already exists
            existing=$(gh pr list --head "$branch" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$existing" ]; then
              echo "PR #$existing already exists for ${name} ${latest}, skipping"
              echo "::endgroup::"
              continue
            fi

            # Bump version
            brew bump-formula-pr \
              --write-only \
              --no-audit \
              --version="$latest" \
              "$formula"

            # Update Python resources if the formula has any
            if grep -q "pypi_packages\|resource \"" "Formula/${name}.rb"; then
              brew update-python-resources \
                --ignore-non-pypi-packages \
                --version="$latest" \
                "$formula" || true
            fi

            # Create PR if there are changes
            if git diff --quiet "Formula/${name}.rb"; then
              echo "No changes for ${name}, skipping"
              echo "::endgroup::"
              continue
            fi

            git checkout -b "$branch"
            git add "Formula/${name}.rb"
            git commit -m "${name} ${latest}"
            git push -u origin "$branch"

            body="${name} ${current} → ${latest} (automated)"
            if [ "$name" = "paperless-ngx" ]; then
              body=$(cat <<EOF
          Automated version bump from ${current} to ${latest}.

          - Version and checksum updated via \`brew bump-formula-pr\`
          - Python resources updated via \`brew update-python-resources\`

          > [!NOTE]
          > Review the Python resource changes. The \`psycopg-c\` resource at the
          > end of the file (added via \`send\`) is not managed by
          > \`update-python-resources\` and may need a manual update.
          EOF
              )
            fi

            gh pr create \
              --title "${name} ${latest}" \
              --body "$body"

            # Return to main for the next formula
            git checkout main

            echo "::endgroup::"
          done
